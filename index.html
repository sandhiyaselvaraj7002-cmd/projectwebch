<!DOCTYPE html>
<html>
<head>
    <title>UsSpace Login 💜</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(to right,#ff9a9e,#fad0c4);
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 15px;
            width: 80%;
            max-width: 300px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            background: #f2f2f2;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            background: #ff4d6d;
            color: white;
            border: none;
            border-radius: 10px;
        }
    </style>

    <title>Background UI</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff4d6d">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="apple-touch-icon" href="icon-192.png">

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js")
        .then(reg => console.log("Background UI Registered!"))
        .catch(err => console.log("PWA Setup Failed", err));
    });
  }
</script>
</head>

<body>

<div class="box">
    <h2> Let'S colour with UI</h2><br>
    <h4>needs authentication to change entire UI</h4>
    <input type="password" id="pin" placeholder="Enter PIN">
    <button onclick="login()">Unlock</button>
</div>

<script>
function login(){
    if(document.getElementById("pin").value === "1436"){
        window.location.href="home.html";
    } else alert("Wrong PIN ❌");
}
</script>

</body>
</html>
