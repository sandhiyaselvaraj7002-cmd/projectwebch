<!DOCTYPE html>
<html>
<head>
    <title>UsSpace 💜</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Background UI</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ff4d6d">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="apple-touch-icon" href="icon-192.png">

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js")
        .then(reg => console.log("Background UI Registered!"))
        .catch(err => console.log("PWA Setup Failed", err));
    });
  }
</script>
</head>

<body>

<!-- 🔝 HEADER -->
<div class="home-header">💬 UsSpace</div>

<!-- 💜 WELCOME -->
<div class="welcome">
    <h3 id="homeName">My Person 💜</h3>
    <p>Always with you 💫</p>
</div>

<!-- 💬 CHAT ENTRY -->
<div class="chat-item" onclick="openChat()">
    💜 Open Chat
    <p id="lastMsg">No messages yet...</p>
</div>

<!-- ❤️ HEART BUTTON -->
<div class="heart-container">
    <button class="heart-circle" onclick="quickMissYou()">❤️</button>
</div>

<!-- 📝 NOTES SECTION -->
<div class="notes-preview">
    <div class="notes-header">
        📝 Notes
        <span onclick="openNotes()">See All</span>
    </div>

    <div id="notesPreviewList"></div>

    <button class="add-note-btn" onclick="addNote()">➕ Add Note</button>
</div>

<script type="module" src="script.js"></script>
</body>
</html>
